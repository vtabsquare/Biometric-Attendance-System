<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Identity - FaceAuth</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='206') }}">
    <style>
        .verify-container { max-width: 500px; margin: 60px auto; text-align: center; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 12px; transform: scaleX(-1); background: #000; }
        .btn-verify { background: #1a73e8; color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 20px; font-size: 16px; }
        #status { margin-top: 20px; font-weight: 600; color: #5f6368; }
    </style>
</head>
<body>
    <div class="verify-container">
        <h2 style="color: #1a73e8;">Biometric Verification</h2>
        <p>Hello <strong>{{ name }}</strong>, please scan your face to <strong>{{ mode }}</strong>.</p>
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <button id="verifyBtn" class="btn-verify">Verify Identity & Location</button>
        <p id="status">Initializing Camera...</p>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btn = document.getElementById('verifyBtn');
        const status = document.getElementById('status');
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'login';

        // Camera Initialization
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { 
                video.srcObject = stream; 
                status.innerText = "Camera Ready. Press button to scan."; 
            })
            .catch(err => { 
                status.innerText = "Camera Error: Please allow access"; 
            });

        btn.onclick = () => {
            btn.disabled = true;
            status.innerText = "Fetching High-Accuracy GPS...";
            
            // Step 1: Get GPS Position with High Accuracy
            navigator.geolocation.getCurrentPosition((position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                
                // FIXED URL: Using standard Google Maps format
                const mapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;

                status.innerText = "Analyzing Face...";
                const context = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0);
                const imageData = canvas.toDataURL('image/jpeg');

                // Step 2: Send to Backend
                fetch('/process_verification', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        image: imageData, 
                        mode: mode,
                        location: mapsUrl 
                    })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        status.style.color = "#34a853";
                        status.innerText = "Success! Identity & Location Verified.";
                        setTimeout(() => {
                            window.location.href = mode === 'logout' ? "/logout" : "/employee/dashboard";
                        }, 1500);
                    } else {
                        btn.disabled = false;
                        status.style.color = "#ea4335";
                        status.innerText = "Face not recognized. Try again.";
                    }
                });
            }, (error) => {
                btn.disabled = false;
                alert("Location Error: Please ensure GPS is ON and permissions are allowed.");
                status.innerText = "Location access denied.";
            }, {
                enableHighAccuracy: true, // Forces phone to use GPS instead of Wi-Fi
                timeout: 10000,
                maximumAge: 0
            });
        };
    </script>
</body>
</html>
