<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Your Account - FaceAuth</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='130') }}">
    <style>
        .input-wrapper { position: relative; margin-bottom: 15px; }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #94a3b8;
        }
        .rules-box { background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: left; border: 1px solid #e2e8f0; }
        .rules-list { margin: 0; padding-left: 20px; font-size: 13px; color: #475569; }
        .error-message { background: #fff1f2; color: #e11d48; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; border: 1px solid #fecdd3; }
    </style>
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 style="color:var(--primary); margin-bottom: 10px;">New Password</h2>
            
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="error-message">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <div class="rules-box">
                <span style="font-weight:700; font-size:14px;">Requirements:</span>
                <ul class="rules-list">
                    <li>Min 8 characters</li>
                    <li>1 Uppercase (A-Z)</li>
                    <li>1 Special character (@$!%*?&)</li>
                </ul>
            </div>

            <form action="/update_password" method="POST" onsubmit="return validatePasswords()">
                <div class="input-wrapper">
                    <input type="password" name="password" id="password" placeholder="New Password" required 
                           style="width:100%; padding:14px; border-radius:10px; border:1px solid #cbd5e1;">
                    <i class="fa-solid fa-eye toggle-password" onclick="toggleVisibility('password', this)"></i>
                </div>

                <div class="input-wrapper">
                    <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required 
                           style="width:100%; padding:14px; border-radius:10px; border:1px solid #cbd5e1;">
                    <i class="fa-solid fa-eye toggle-password" onclick="toggleVisibility('confirm_password', this)"></i>
                </div>

                <button type="submit" class="btn-primary" style="width:100%; margin-top:10px;">Save Password</button>
            </form>
        </div>
    </div>

    <script>
        // TOGGLE LOGIC
        function toggleVisibility(id, icon) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }

        // VALIDATION LOGIC
        function validatePasswords() {
            const pass = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            if (pass !== confirm) { alert("Passwords do not match!"); return false; }
            const regex = /^(?=.*[A-Z])(?=.*[@$!%*?&]).{8,}$/;
            if (!regex.test(pass)) { alert("Does not meet security requirements."); return false; }
            return true;
        }
    </script>
</body>
</html>
