<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Identity - FaceAuth</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='208') }}">
    <style>
        .verify-container { max-width: 500px; margin: 60px auto; text-align: center; background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        video { width: 100%; border-radius: 12px; transform: scaleX(-1); background: #000; }
        .btn-verify { background: #1a73e8; color: white; padding: 15px; border: none; border-radius: 8px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 20px; font-size: 16px; transition: 0.3s; }
        .btn-verify:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 20px; font-weight: 600; color: #5f6368; }
    </style>
</head>
<body>
    <div class="verify-container">
        <h2 style="color: #1a73e8;">Biometric Verification</h2>
        <p>Hello <strong>{{ name }}</strong>, please scan your face to <strong>{{ mode }}</strong>.</p>
        <video id="video" autoplay muted playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <button id="verifyBtn" class="btn-verify">Verify Identity & Location</button>
        <p id="status">Initializing Camera...</p>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const btn = document.getElementById('verifyBtn');
        const status = document.getElementById('status');
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || '{{ mode }}';

        let detailedLocation = "Unknown District, India"; // Store District/Country

        // Camera Initialization
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { 
                video.srcObject = stream; 
                status.innerText = "Camera Ready. Press button to scan."; 
            })
            .catch(err => { 
                status.innerText = "Camera Error: Please allow access"; 
            });

        // Step 1: Background Location Tracker
        function getDetailedLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    
                    // Standard Google Maps format
                    window.mapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;

                    // Fetch District/Country from OpenStreetMap (Free)
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                        const data = await res.json();
                        const district = data.address.city || data.address.town || data.address.village || "District Not Found";
                        const country = data.address.country || "India";
                        detailedLocation = `${district}, ${country}`;
                    } catch (e) {
                        detailedLocation = "Location Shared";
                    }
                }, null, { enableHighAccuracy: true });
            }
        }
        getDetailedLocation(); // Trigger immediately on load

        btn.onclick = () => {
            btn.disabled = true;
            status.innerText = "Processing Face & Location...";
            
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            const imageData = canvas.toDataURL('image/jpeg');

            // Send to Backend
            fetch('/process_verification', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    image: imageData, 
                    mode: mode,
                    location: window.mapsUrl || "Location Hidden",
                    detailed_location: detailedLocation 
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    status.style.color = "#34a853";
                    status.innerText = "Success! Identity & Location Verified.";
                    
                    // --- UPDATED REDIRECT LOGIC ---
                    setTimeout(() => {
                        // If backend sends a specific redirect (like "/") use it, else go to dashboard
                        window.location.href = data.redirect || (mode === 'logout' ? "/logout" : "/employee/dashboard");
                    }, 1500);
                    
                } else {
                    btn.disabled = false;
                    status.style.color = "#ea4335";
                    status.innerText = "Face not recognized. Try again.";
                }
            })
            .catch(err => {
                btn.disabled = false;
                status.innerText = "Server Error. Please try again.";
            });
        };
    </script>
</body>
</html>
