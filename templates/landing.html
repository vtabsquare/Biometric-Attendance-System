<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FaceAuth - Biometric Attendance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='5') }}">
    <style>
        /* Modern Gradient Background */
        body {
            background: radial-gradient(circle at top right, #eef2ff 0%, #fcfdfe 100%);
            overflow: hidden;
        }

        .hero-container {
            text-align: center;
            max-width: 800px;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .badge-new {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(37, 99, 235, 0.1);
            color: var(--primary);
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }

        /* Decorative Background Shapes */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.05) 0%, rgba(99, 102, 241, 0.05) 100%);
            filter: blur(60px);
            border-radius: 50%;
            z-index: 0;
        }
    </style>
</head>
<body class="auth-body">
    <div class="blob" style="top: -10%; right: -10%;"></div>
    <div class="blob" style="bottom: -10%; left: -10%;"></div>

    <div style="position: absolute; top: 40px; left: 60px; display: flex; align-items: center; gap: 12px;">
        <div style="background:var(--primary); width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:white; font-weight:800;">F</div>
        <span style="font-size: 22px; font-weight: 800; color: var(--text-dark);">FaceAuth</span>
    </div>

    <div class="hero-container">
        <div class="badge-new">NEXT-GEN BIOMETRICS</div>
        
        <h1 style="font-size: 72px; font-weight: 800; line-height: 1.1; color: var(--text-dark); margin-bottom: 24px; letter-spacing: -2px;">
            Biometric <br><span style="color: var(--primary);">Attendance.</span>
        </h1>
        
        <p style="font-size: 19px; color: var(--text-muted); max-width: 580px; margin: 0 auto 40px; line-height: 1.6;">
            The secure, contactless facial recognition system built for modern workspaces and professional environments.
        </p>

        <div style="display: flex; gap: 16px; justify-content: center;">
            <button onclick="location.href='{{ url_for('login') }}'" class="btn-primary" style="width: auto; padding: 18px 48px; font-size: 18px;">
                Get Started Now →
            </button>
        </div>
    </div>

    <div style="position: absolute; bottom: 40px; font-size: 12px; color: var(--text-muted); font-weight: 600;">
        © 2026 FaceAuth Inc. All rights reserved.
    </div>
</body>
</html>
