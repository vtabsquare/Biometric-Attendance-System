<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - FaceAuth</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='9') }}">
</head>
<body class="auth-body">
    <div class="auth-card">
        <div style="background:var(--primary-soft); width:50px; height:50px; border-radius:14px; display:flex; align-items:center; justify-content:center; margin: 0 auto 20px; color:var(--primary);">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </div>

        <h2 id="title">Forgot password?</h2>
        <p id="desc" style="color:var(--text-muted); font-size:14px; margin-bottom:30px;">Enter your email to receive a 6-digit verification code.</p>

        <div id="step-email">
            <div class="form-group">
                <label>Work Email</label>
                <input type="email" id="user_email" placeholder="name@company.com" required>
            </div>
            <button id="send-btn" onclick="handleSendOTP()" class="btn-primary">Send OTP →</button>
        </div>

        <div id="step-otp" class="hidden">
            <div style="display:flex; gap:10px; justify-content:center; margin-bottom:24px;">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveFocus(this, 0)" style="width:42px; height:50px; text-align:center; font-size:20px; font-weight:700;">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveFocus(this, 1)" style="width:42px; height:50px; text-align:center; font-size:20px; font-weight:700;">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveFocus(this, 2)" style="width:42px; height:50px; text-align:center; font-size:20px; font-weight:700;">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveFocus(this, 3)" style="width:42px; height:50px; text-align:center; font-size:20px; font-weight:700;">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveFocus(this, 4)" style="width:42px; height:50px; text-align:center; font-size:20px; font-weight:700;">
                <input type="text" class="otp-input" maxlength="1" onkeyup="moveFocus(this, 5)" style="width:42px; height:50px; text-align:center; font-size:20px; font-weight:700;">
            </div>
            <button id="verify-btn" onclick="handleVerifyOTP()" class="btn-primary">Verify & Proceed</button>
            <p style="margin-top:20px; font-size:13px; color:var(--text-muted);">
                Didn't get the code? <a href="javascript:location.reload()" style="color:var(--primary); text-decoration:none; font-weight:700;">Resend</a>
            </p>
        </div>

        <a href="{{ url_for('login') }}" style="display:block; margin-top:30px; font-size:13px; color:var(--text-muted); text-decoration:none; font-weight:600;">← Back to login</a>
    </div>

    <script>
        function handleSendOTP() {
            const email = document.getElementById('user_email').value;
            const btn = document.getElementById('send-btn');

            if (!email) { alert("Please enter your email."); return; }

            btn.innerText = "Sending...";
            btn.disabled = true;

            fetch('/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('step-email').classList.add('hidden');
                    document.getElementById('step-otp').classList.remove('hidden');
                    document.getElementById('title').innerText = "Verify Code";
                    document.getElementById('desc').innerText = "We sent a code to " + email;
                } else {
                    alert(data.message);
                    btn.innerText = "Send OTP →";
                    btn.disabled = false;
                }
            })
            .catch(err => {
                alert("Server error. Check your Brevo API key.");
                btn.disabled = false;
            });
        }

        function moveFocus(el, index) {
            if (el.value.length >= 1 && index < 5) {
                document.querySelectorAll('.otp-input')[index + 1].focus();
            }
        }

        function handleVerifyOTP() {
            const email = document.getElementById('user_email').value;
            const inputs = document.querySelectorAll('.otp-input');
            const btn = document.getElementById('verify-btn');
            
            let otp = "";
            inputs.forEach(input => otp += input.value);

            if (otp.length < 6) { alert("Please enter the full 6-digit code."); return; }

            btn.innerText = "Verifying...";

            fetch('/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, otp: otp })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    window.location.href = "{{ url_for('reset_password') }}";
                } else {
                    alert(data.message);
                    btn.innerText = "Verify & Proceed";
                }
            });
        }
    </script>
</body>
</html>
