<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify Face - FaceAuth</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .camera-container { max-width: 500px; margin: 50px auto; text-align: center; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        video, canvas { width: 100%; border-radius: 8px; }
        .btn-verify { background: #34a853; color: white; padding: 12px 24px; border: none; border-radius: 8px; margin-top: 20px; cursor: pointer; font-weight: bold; width: 100%; }
        #status { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="camera-container">
        <h2>Verify Identity</h2>
        <p>Hello, <strong>{{ name }}</strong>. Please verify your face to proceed.</p>
        <video id="video" autoplay muted playsinline></video>
        <button id="verify" class="btn-verify">Verify Now</button>
        <canvas id="canvas" style="display:none;"></canvas>
        <p id="status">Initializing...</p>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const verifyBtn = document.getElementById('verify');
        const status = document.getElementById('status');
        
        // Get mode (login/logout) from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode') || 'login';

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; status.innerText = "Scan Ready"; })
            .catch(err => { status.innerText = "Error accessing camera."; });

        verifyBtn.onclick = () => {
            status.innerText = "Verifying...";
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            
            const imageData = canvas.toDataURL('image/jpeg');

            fetch('/process_verification', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData, mode: mode })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    status.style.color = "green";
                    status.innerText = "Identity Verified!";
                    setTimeout(() => {
                        // FORCE REDIRECT TO EMPLOYEE DASHBOARD ON RENDER
                        window.location.href = "https://biometric-attendance-system-tsca.onrender.com/employee/dashboard";
                    }, 1500);
                } else {
                    status.style.color = "red";
                    status.innerText = "Face not recognized. Try again.";
                }
            });
        };
    </script>
</body>
</html>
