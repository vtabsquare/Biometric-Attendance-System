<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - FaceAuth</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v='10') }}">
    <style>
        .hidden { display: none; }
        .otp-input { 
            width: 42px; height: 50px; text-align: center; 
            font-size: 20px; font-weight: 700; border: 1px solid #e2e8f0; 
            border-radius: 8px; outline: none; transition: 0.2s;
        }
        .otp-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1); }
    </style>
</head>
<body class="auth-body">
    <div class="auth-card">
        <div style="background:#eff6ff; width:60px; height:60px; border-radius:16px; display:flex; align-items:center; justify-content:center; margin: 0 auto 20px; color:var(--primary);">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </div>

        <h2 id="title">Forgot password?</h2>
        <p id="desc" style="color:#64748b; font-size:14px; margin-bottom:30px;">Enter your email to receive a 6-digit verification code.</p>

        <div id="step-email">
            <div class="form-group" style="text-align: left; margin-bottom: 20px;">
                <label style="font-weight: 600; display: block; margin-bottom: 8px;">Work Email</label>
                <input type="email" id="user_email" placeholder="name@company.com" required style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px;">
            </div>
            <button id="send-btn" onclick="handleSendOTP()" class="btn-primary" style="width: 100%; padding: 12px; font-weight: 700; cursor: pointer;">Send OTP →</button>
        </div>

        <div id="step-otp" class="hidden">
            <div id="otp-inputs" style="display:flex; gap:10px; justify-content:center; margin-bottom:24px;">
                <input type="text" class="otp-input" maxlength="1">
                <input type="text" class="otp-input" maxlength="1">
                <input type="text" class="otp-input" maxlength="1">
                <input type="text" class="otp-input" maxlength="1">
                <input type="text" class="otp-input" maxlength="1">
                <input type="text" class="otp-input" maxlength="1">
            </div>
            <button id="verify-btn" onclick="handleVerifyOTP()" class="btn-primary" style="width: 100%; padding: 12px; font-weight: 700; cursor: pointer;">Verify & Proceed</button>
            <p style="margin-top:20px; font-size:13px; color:#64748b;">
                Didn't get the code? <a href="javascript:location.reload()" style="color:var(--primary); text-decoration:none; font-weight:700;">Resend</a>
            </p>
        </div>

        <a href="{{ url_for('login') }}" style="display:block; margin-top:30px; font-size:13px; color:#64748b; text-decoration:none; font-weight:600;">← Back to login</a>
    </div>

    <script>
        // Move focus between OTP inputs
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('keyup', (e) => {
                if (e.key >= 0 && e.key <= 9) {
                    if (index < inputs.length - 1) inputs[index + 1].focus();
                } else if (e.key === "Backspace") {
                    if (index > 0) inputs[index - 1].focus();
                }
            });
        });

        function handleSendOTP() {
            const email = document.getElementById('user_email').value;
            const btn = document.getElementById('send-btn');

            if (!email) { alert("Please enter your email."); return; }

            btn.innerText = "Sending...";
            btn.disabled = true;

            fetch('/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    document.getElementById('step-email').classList.add('hidden');
                    document.getElementById('step-otp').classList.remove('hidden');
                    document.getElementById('title').innerText = "Verify Code";
                    document.getElementById('desc').innerText = "We sent a code to " + email;
                    inputs[0].focus();
                } else {
                    alert(data.message || "Failed to send OTP.");
                    btn.innerText = "Send OTP →";
                    btn.disabled = false;
                }
            })
            .catch(err => {
                alert("Server error. Check your connection.");
                btn.innerText = "Send OTP →";
                btn.disabled = false;
            });
        }

        function handleVerifyOTP() {
            const email = document.getElementById('user_email').value;
            const btn = document.getElementById('verify-btn');
            
            let otp = "";
            inputs.forEach(input => otp += input.value);

            if (otp.length < 6) { alert("Please enter the full 6-digit code."); return; }

            btn.innerText = "Verifying...";
            btn.disabled = true;

            fetch('/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, otp: otp })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    // Redirect to reset password page
                    window.location.href = "{{ url_for('reset_password') }}";
                } else {
                    alert(data.message || "Invalid OTP. Please try again.");
                    btn.innerText = "Verify & Proceed";
                    btn.disabled = false;
                }
            })
            .catch(err => {
                alert("Error connecting to server.");
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
